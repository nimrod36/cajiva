name: Kickoff Feature Automation

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write
  contents: read

jobs:
  kickoff-feature:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Feature Kickoff with Copilot
        uses: actions/github-script@v7
        env:
          MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueBody = context.payload.issue.body || '';
            const issueTitle = context.payload.issue.title || '';
            const issueLabels = context.payload.issue.labels.map(l => l.name).join(', ');
            
            // Read the kickoff-feature and create-test-plan prompts
            const fs = require('fs');
            
            let learnFeatureRequest, createTestPlanPrompt;
            try {
              learnFeatureRequest = fs.readFileSync('.github/prompts/learn-feature-request.prompt.md', 'utf8');
              createTestPlanPrompt = fs.readFileSync('.github/prompts/create-test-plan.prompt.md', 'utf8');
            } catch (error) {
              console.log('Could not read prompt files, using inline prompts');
            }
            
            // Construct the system prompt for Copilot
            const systemPrompt = learnFeatureRequest;
            
            
            const userPrompt = 'Feature: ' + issueTitle + '\n' +
               'Labels: ' + (issueLabels || 'None') + '\n\n' +
               'Description:\n' + issueBody + '\n\n';

            try {
              // Call GitHub Models API (Copilot-powered)
              const modelsToken = process.env.MODELS_TOKEN || process.env.GITHUB_TOKEN;

              if (!modelsToken) {
                throw new Error('Missing token. Set MODELS_TOKEN secret.');
              }

              const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${modelsToken}`
                },
                body: JSON.stringify({
                  messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user', content: userPrompt }
                  ],
                  model: 'gpt-4o',
                  temperature: 0.7,
                  max_tokens: 4000
                })
              });
              
              if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`API call failed: ${response.status} ${response.statusText}\n${errorText}`);
              }
              
              const data = await response.json();
              const featureAnalysis = data.choices[0].message.content;

              console.log('✅ Step 1: Feature analysis complete');

              // Step 2: Generate test plan using the feature analysis
              const testPlanResponse = await fetch('https://models.inference.ai.azure.com/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${modelsToken}`
                },
                body: JSON.stringify({
                  messages: [
                    { role: 'system', content: createTestPlanPrompt },
                    { role: 'user', content: featureAnalysis }
                  ],
                  model: 'gpt-4o',
                  temperature: 0.7,
                  max_tokens: 4000
                })
              });
              
              if (!testPlanResponse.ok) {
                const errorText = await testPlanResponse.text();
                throw new Error(`Test plan API call failed: ${testPlanResponse.status} ${testPlanResponse.statusText}\n${errorText}`);
              }
              
              const testPlanData = await testPlanResponse.json();
              const generatedContent = testPlanData.choices[0].message.content;
              
              console.log('✅ Step 2: Test plan generated');
              
              // Extract the file path and Gherkin content from the Final Gherkin section
              const finalGherkinMatch = generatedContent.match(/###\s+✅\s+Final Gherkin.*?`(specs\/[^`]+\.feature)`[^`]*```gherkin\n([\s\S]+?)```/i);
              
              let featureFilePath, gherkinContent;
              if (finalGherkinMatch) {
                featureFilePath = finalGherkinMatch[1];
                gherkinContent = finalGherkinMatch[2].trim();
                console.log('✅ Extracted path: ' + featureFilePath);
              } else {
                // Fallback: try to find any file path and gherkin block
                const pathMatch = generatedContent.match(/`(specs\/[^`]+\.feature)`/);
                const codeMatch = generatedContent.match(/```gherkin\n([\s\S]+?)```/);
                if (pathMatch && codeMatch) {
                  featureFilePath = pathMatch[1];
                  gherkinContent = codeMatch[1].trim();
                  console.log('✅ Extracted path (fallback): ' + featureFilePath);
                } else {
                  throw new Error('Could not extract file path and Gherkin content from AI response');
                }
              }
              
              // Create branch name from issue
              const branchName = 'feature/issue-' + issueNumber + '-' + issueTitle.toLowerCase().replace(/[^a-z0-9]+/g, '-').substring(0, 50);
              
              // Get default branch
              const { data: repo } = await github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              const defaultBranch = repo.default_branch;
              
              // Get the SHA of the default branch
              const { data: refData } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'heads/' + defaultBranch
              });
              const baseSha = refData.object.sha;
              
              // Create new branch
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'refs/heads/' + branchName,
                sha: baseSha
              });
              
              console.log('✅ Created branch: ' + branchName);
              
              // Create the feature file
              const featureContent = Buffer.from(gherkinContent).toString('base64');
              
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: featureFilePath,
                message: 'Add BDD test plan for issue #' + issueNumber + ': ' + issueTitle,
                content: featureContent,
                branch: branchName
              });
              
              console.log('✅ Created feature file: ' + featureFilePath);
              
              // Create step definitions stub file
              const featureName = featureFilePath.match(/specs\/([^\/]+)\//)[1];
              const stepDefsFile = 'specs/' + featureName + '/step_definitions/' + featureName + '_steps.rb';
              
              const stepDefsContent = '# Step definitions for ' + issueTitle + '\n' +
                '# Generated from issue #' + issueNumber + '\n\n' +
                '# Implement your step definitions here\n';
              
              await github.rest.repos.createOrUpdateFileContents({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: stepDefsFile,
                message: 'Add step definitions stub for issue #' + issueNumber,
                content: Buffer.from(stepDefsContent).toString('base64'),
                branch: branchName
              });
              
              console.log('✅ Created step definitions stub: ' + stepDefsFile);
              
              // Create Pull Request
              const prBody = '## 🤖 Auto-generated BDD Test Plan\n\n' +
                '**Issue:** #' + issueNumber + '\n' +
                '**Feature File:** `' + featureFilePath + '`\n' +
                '**Step Definitions:** `' + stepDefsFile + '`\n\n' +
                '### AI-Generated Content\n\n' +
                generatedContent + '\n\n' +
                '---\n\n' +
                '### Next Steps\n' +
                '1. Review the scenarios in [`' + featureFilePath + '`](../blob/' + branchName + '/' + featureFilePath + ')\n' +
                '2. Implement step definitions in [`' + stepDefsFile + '`](../blob/' + branchName + '/' + stepDefsFile + ')\n' +
                '3. Run tests: `cucumber ' + featureFilePath + '`\n' +
                '4. Use [`@copilot /add-test-coverage`](.github/prompts/add-test-coverage.prompt.md) to extend coverage\n\n' +
                '*Closes #' + issueNumber + ' once merged*';

              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Feature: ' + issueTitle,
                head: branchName,
                base: defaultBranch,
                body: prBody
              });
              
              console.log('✅ Created pull request #' + pr.number);
              
              // Add labels
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['auto-generated', 'bdd-test-plan']
              });
              
              // Comment on the original issue with PR link
              const issueComment = '## ✅ BDD Test Plan Generated\n\n' +
                '**Pull Request:** #' + pr.number + '\n' +
                '**Branch:** `' + branchName + '`\n' +
                '**Feature File:** `' + featureFilePath + '`\n\n' +
                'Review the comprehensive test plan in the PR!\n\n' +
                '*Generated using two-step AI workflow: feature analysis → test plan*';
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: issueComment
              });
              
              console.log('✅ All automation steps completed successfully');
              
            } catch (error) {
              console.error('❌ Error generating feature kickoff:', error);
              
              // Fallback: Post manual template
              const fallbackComment = '## ⚠️ Automated Feature Kickoff Failed\n\n' +
                'Unable to automatically generate the test plan. Please manually apply:\n\n' +
                '### Use Copilot Prompts:\n' +
                '- [`@copilot /kickoff-feature`](.github/prompts/kickoff-feature.prompt.md) - Generate test plan\n' +
                '- [`@copilot /create-test-plan`](.github/prompts/create-test-plan.prompt.md) - Create Gherkin scenarios\n\n' +
                '### Manual Test Plan Template:\n\n' +
                '```gherkin\n' +
                'Feature: ' + issueTitle + '\n' +
                '  \n' +
                '  Scenario: Happy path\n' +
                '    Given [initial state]\n' +
                '    When [action]\n' +
                '    Then [expected outcome]\n' +
                '  \n' +
                '  Scenario: Error handling\n' +
                '    Given [error condition]\n' +
                '    When [action]\n' +
                '    Then [error response]\n' +
                '```\n\n' +
                '---\n\n' +
                '*Error: ' + error.message + '*';
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: fallbackComment
              });
            }
